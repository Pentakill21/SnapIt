<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Snap It</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<!-- CAMERA SCREEN -->

<main id="cameraScreen">


<video id="cameraView" autoplay playsinline></video>


<button class="shutter" onclick="takePhoto()"></button>



<div class="bottomNav">

<button onclick="openChatList()">

<svg viewBox="0 0 24 24">
<path d="M3 10.5L12 3l9 7.5v9a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/>
</svg>

</button>



<button onclick="openCamera()">

<svg viewBox="0 0 24 24">
<rect x="4" y="6" width="16" height="14" rx="3"/>
<circle cx="12" cy="13" r="4"/>
<path d="M8 6l1.5-3h5L16 6"/>
</svg>

</button>



<button onclick="openSearch()">

<svg viewBox="0 0 24 24">
<circle cx="10" cy="10" r="6"/>
<line x1="14.5" y1="14.5" x2="21" y2="21"/>
</svg>

</button>

</div>


</main>





<!-- FRIEND LIST -->

<main id="chatScreen" class="hidden">


<h1 class="title">
Chats
</h1>


<div id="friendList"></div>



<div class="bottomNav">


<button onclick="openChatList()">

<svg viewBox="0 0 24 24">
<path d="M3 10.5L12 3l9 7.5v9a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/>
</svg>

</button>


<button onclick="openCamera()">

<svg viewBox="0 0 24 24">
<rect x="4" y="6" width="16" height="14" rx="3"/>
<circle cx="12" cy="13" r="4"/>
<path d="M8 6l1.5-3h5L16 6"/>
</svg>

</button>


<button onclick="openSearch()">

<svg viewBox="0 0 24 24">
<circle cx="10" cy="10" r="6"/>
<line x1="14.5" y1="14.5" x2="21" y2="21"/>
</svg>

</button>


</div>


</main>







<!-- SEARCH -->

<main id="searchScreen" class="hidden">


<h1 class="title">
Search
</h1>


<input id="searchBox"
placeholder="Search people..."
oninput="searchPeople()">



<div id="searchResults"></div>




<div class="bottomNav">


<button onclick="openChatList()">

<svg viewBox="0 0 24 24">
<path d="M3 10.5L12 3l9 7.5v9a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/>
</svg>

</button>


<button onclick="openCamera()">

<svg viewBox="0 0 24 24">
<rect x="4" y="6" width="16" height="14" rx="3"/>
<circle cx="12" cy="13" r="4"/>
<path d="M8 6l1.5-3h5L16 6"/>
</svg>

</button>


<button onclick="openSearch()">

<svg viewBox="0 0 24 24">
<circle cx="10" cy="10" r="6"/>
<line x1="14.5" y1="14.5" x2="21" y2="21"/>
</svg>

</button>


</div>


</main>







<!-- CHAT -->

<main id="messageScreen" class="hidden">


<div class="chatHeader">


<button onclick="openChatList()">
←
</button>


<button class="friendNameButton" onclick="openProfile()">

<span id="chatName">
Friend
</span>

<span>
>
</span>


</button>


</div>




<div id="messages"></div>




<form class="messageBar" onsubmit="sendMessage(); return false;">


<input id="messageInput"
placeholder="Message...">



<button type="submit">
➤
</button>


</form>


</main>







<!-- PROFILE -->


<main id="profileScreen" class="hidden">


<div class="profileHeader">


<button onclick="backToChat()">
←
</button>


<h1 id="profileName">
Profile
</h1>


</div>



<div class="profileCard">


<h2 id="profileFriendName">
Friend
</h2>


<p>⭐ SnapIt member: 6 months</p>

<p>🔥 Streak: 37 days</p>

<p>📸 Snaps sent: 1,842</p>

<p>💬 Messages: 6,420</p>


</div>




<button class="unaddButton" onclick="unaddFriend()">

UNADD FRIEND

</button>



</main>



</div>



<script src="app.js"></script>


</body>

</html>
