<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Snap It</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>

<div class="app">

    <header>
        <h1>Snap It</h1>
        <button id="cameraButton">📸</button>
    </header>


    <main id="homeScreen">

        <h2>AI Friends</h2>


        <div class="friend" onclick="openChat('Emma')">

            <div class="avatar">
                😊
            </div>

            <div>
                <h3>Emma</h3>
                <p>Hey, how was your day?</p>
            </div>

        </div>



        <div class="friend" onclick="openChat('Jake')">

            <div class="avatar">
                😎
            </div>

            <div>
                <h3>Jake</h3>
                <p>Bro, what are you up to?</p>
            </div>

        </div>



        <div class="friend" onclick="openChat('Sophie')">

            <div class="avatar">
                💙
            </div>

            <div>
                <h3>Sophie</h3>
                <p>I was thinking about something...</p>
            </div>

        </div>


    </main>



    <main id="chatScreen" class="hidden">

        <button onclick="goHome()">← Back</button>

        <h2 id="chatName"></h2>


        <div id="messages"></div>


        <div class="inputArea">

            <input 
            id="messageInput"
            placeholder="Message..."
            >


            <button onclick="sendMessage()">
                Send
            </button>

        </div>


    </main>


</div>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}
</script>
<script src="app.js"></script>

</body>
</html>
