<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SnapIt</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">



<!-- CAMERA / HOME SCREEN -->

<main id="cameraScreen">


    <div class="cameraHeader">

        <h2>SnapIt</h2>

        <button>
            ⚙️
        </button>

    </div>



    <div class="cameraView">

        <div class="cameraMessage">
            Camera
        </div>


    </div>



    <div class="cameraControls">


        <button onclick="openSearch()">
            🔍
        </button>



        <button onclick="takePhoto()" class="shutter">

            📸

        </button>



        <button>
            ⚡
        </button>


    </div>


</main>




<!-- CHAT LIST SCREEN -->

<main id="chatScreen" class="hidden">


    <h2>
        Chats
    </h2>


    <div id="friendList">

    </div>


</main>
<!-- SEARCH SCREEN -->

<main id="searchScreen" class="hidden">


    <h2>
        Search
    </h2>



    <input 
    id="searchBox"
    placeholder="Search people..."
    oninput="searchPeople()">



    <div id="searchResults">

    </div>



</main>






<!-- MESSAGE SCREEN -->

<main id="messageScreen" class="hidden">



    <div class="chatHeader">


        <button onclick="openChatList()">
            ←
        </button>



        <h2 id="chatName">
            Alex
        </h2>



        <button onclick="openProfile()">
            👤
        </button>



    </div>





    <div id="typingIndicator" class="typing hidden">

        Alex is typing...

    </div>





    <div id="messages">

    </div>





    <div class="messageBox">


        <input 
        id="messageInput"
        placeholder="Message...">



        <button onclick="sendMessage()">

            ➤

        </button>


    </div>



</main>
<!-- PROFILE SCREEN -->

<main id="profileScreen" class="hidden">


    <div class="profileCard">


        <div class="profilePicture">

            👤

        </div>



        <h1 id="profileFriendName">

            Alex

        </h1>



        <p id="profileUsername">

            @alex

        </p>



        <p id="profileStatus">

            😂 Funny best friend

        </p>





        <div class="profileStats">


            <div>

                🔥
                <span id="streakCount">
                    51
                </span>

                day streak

            </div>



            <div>

                👥 Friends since

                <br>

                January 2026

            </div>



        </div>





        <div class="personalityBox">


            🤖 AI Personality

            <br>


            <span id="personality">

                Funny + Casual

            </span>


        </div>




        <button onclick="openChat(currentFriend)">

            Message

        </button>





        <button onclick="unaddFriend()">

            Remove Friend

        </button>




    </div>



</main>








<!-- BOTTOM NAVIGATION -->

<nav class="bottomNav">


    <button onclick="openCamera()">

        🏠

    </button>




    <button onclick="openSearch()">

        🔍

    </button>




    <button onclick="openChatList()">

        💬

    </button>




    <button onclick="openProfile()">

        👤

    </button>



</nav>





</div>





<script src="app.js"></script>


</body>

</html>
