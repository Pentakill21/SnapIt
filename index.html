<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Snap It </title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


    <!-- CAMERA SCREEN -->

    <main id="cameraScreen">

        <video id="cameraView" autoplay playsinline></video>


        <button class="shutter" onclick="takePhoto()"></button>


        <div class="bottomNav">

            <button onclick="openChatList()">
                🏠
            </button>


            <button onclick="openCamera()" class="cameraIcon">
                📷
            </button>


            <button onclick="openSearch()">
                🔍
            </button>

        </div>


    </main>





    <!-- CHAT LIST SCREEN -->

    <main id="chatScreen" class="hidden">


        <h1 class="title">
            Chat
        </h1>


        <div id="friendList">


        </div>


        <div class="bottomNav">

            <button onclick="openChatList()">
                🏠
            </button>


            <button onclick="openCamera()">
                📷
            </button>


            <button onclick="openSearch()">
                🔍
            </button>

        </div>


    </main>






    <!-- SEARCH SCREEN -->

    <main id="searchScreen" class="hidden">


        <h1 class="title">
            Search
        </h1>


        <input 
        id="searchBox"
        placeholder="Search people..."
        oninput="searchPeople()"
        >


        <div id="searchResults">

        </div>



        <div class="bottomNav">

            <button onclick="openChatList()">
                🏠
            </button>


            <button onclick="openCamera()">
                📷
            </button>


            <button onclick="openSearch()">
                🔍
            </button>

        </div>


    </main>


</div>


<script src="app.js"></script>


</body>

</html>
